<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>棒球漫畫xAI - 成果展覽</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX parsing -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- PDF.js for cover rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        
        /* 自定義動畫與背景 */
        .grid-pattern {
            background-image: radial-gradient(circle at center, #3b82f6 0.5px, transparent 1px);
            background-size: 24px 24px;
        }
        
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-slow {
            animation: pulse-slow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // 組別配置：第 1~11 組對應 B~L 組
        const getGroupLetter = (groupId) => String.fromCharCode(65 + groupId);
        
        // 組別配置：定義每組的海報和漫畫檔案
        const groupConfig = {
            1: { letter: 'B', poster: '海報.pdf', manga: '漫畫.pdf', hasPoster: true },
            2: { letter: 'C', poster: '海報.pdf', manga: '漫畫.pdf', hasPoster: true },
            3: { letter: 'D', poster: null, manga: '漫畫.pdf', hasPoster: false },
            4: { letter: 'E', poster: '海報.jpg', manga: '漫畫.pdf', hasPoster: true },
            5: { letter: 'F', poster: '海報.pdf', manga: '漫畫.pdf', hasPoster: true },
            6: { letter: 'G', poster: '海報一.png', manga: '漫畫一.pdf', hasPoster: true, variant: 1 },
            7: { letter: 'G', poster: null, manga: '漫畫二.pdf', hasPoster: false, variant: 2 },
            8: { letter: 'H', poster: '海報.png', manga: '漫畫.pdf', hasPoster: true },
            9: { letter: 'I', poster: '海報.jpg', manga: '漫畫.pdf', hasPoster: true },
            10: { letter: 'J', poster: '海報.pdf', manga: '漫畫.pdf', hasPoster: true },
            11: { letter: 'K', poster: '海報.pdf', manga: '漫畫.pdf', hasPoster: true },
            12: { letter: 'L', poster: '海報.jpg', manga: '漫畫.pdf', hasPoster: true },
        };
        
        const getPdfPath = (groupId) => {
            const config = groupConfig[groupId];
            return `manga/${config.letter}/${config.manga}`;
        };
        const getPdfFilename = (groupId) => {
            const config = groupConfig[groupId];
            return `${config.manga}`;
        };
        const getPosterPath = (groupId) => {
            const config = groupConfig[groupId];
            return config.hasPoster ? `manga/${config.letter}/${config.poster}` : null;
        };

        if (typeof pdfjsLib !== 'undefined') {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        }

        // 圖示組件（手寫 SVG 以確保在 HTML 檔案中完美呈現）
        const Icon = ({ name, size = 18, className = "" }) => {
            const icons = {
                cpu: <path d="M20 9V7a2 2 0 0 0-2-2h-2M4 9v2m16 2v2a2 2 0 0 1-2 2h-2M4 13v2a2 2 0 0 0 2 2h2m10-12V3m-4 2V3M8 5V3M3 8h2m0 4h2m0 4h2m10 0h2m-2-4h2m-2-4h2M12 21v-2m4 2v-2M8 21v-2" />,
                qr: (
                    <>
                        <rect width="5" height="5" x="3" y="3" rx="1"/>
                        <rect width="5" height="5" x="16" y="3" rx="1"/>
                        <rect width="5" height="5" x="3" y="16" rx="1"/>
                        <path d="M21 16h-3a2 2 0 0 0-2 2v3"/>
                        <path d="M21 21v.01"/>
                        <path d="M12 7v3a2 2 0 0 1-2 2H7"/>
                        <path d="M3 12h.01"/>
                        <path d="M12 3h.01"/>
                        <path d="M12 16v.01"/>
                        <path d="M16 12h1"/>
                        <path d="M21 12v.01"/>
                        <path d="M12 21v.01"/>
                    </>
                ),
                book: <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20" />,
                info: (
                    <>
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 16v-4"/>
                        <path d="M12 8h.01" />
                    </>
                ),
                share: (
                    <>
                        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
                        <polyline points="16 6 12 2 8 6"/>
                        <line x1="12" x2="12" y1="2" y2="15"/>
                    </>
                )
            };
            
            return (
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    width={size} 
                    height={size} 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [progress, setProgress] = useState(0);
            const [loading, setLoading] = useState(true);
            const [coverUrls, setCoverUrls] = useState({});

            useEffect(() => {
                const timer = setInterval(() => {
                    setProgress((oldProgress) => {
                        if (oldProgress === 100) {
                            clearInterval(timer);
                            setTimeout(() => setLoading(false), 500);
                            return 100;
                        }
                        const diff = Math.random() * 30;
                        return Math.min(oldProgress + diff, 100);
                    });
                }, 100);
                return () => clearInterval(timer);
            }, []);

            // 載入封面：有海報的載入海報圖片，沒海報的載入 PDF 第一頁
            useEffect(() => {
                if (!loading || typeof pdfjsLib === 'undefined') return;
                const loadCovers = async () => {
                    const next = (id, dataUrl) => setCoverUrls((prev) => ({ ...prev, [id]: dataUrl }));
                    for (let gid = 1; gid <= 12; gid++) {
                        const config = groupConfig[gid];
                        if (!config) continue;
                        
                        try {
                            if (config.hasPoster) {
                                // 有海報：載入海報圖片
                                const posterPath = getPosterPath(gid);
                                if (posterPath) {
                                    // 如果是 PDF 海報，用 PDF.js 渲染第一頁
                                    if (posterPath.endsWith('.pdf')) {
                                        const pdf = await pdfjsLib.getDocument(posterPath).promise;
                                        const page = await pdf.getPage(1);
                                        const scale = 2;
                                        const viewport = page.getViewport({ scale });
                                        const canvas = document.createElement('canvas');
                                        canvas.width = viewport.width;
                                        canvas.height = viewport.height;
                                        await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                                        next(gid, canvas.toDataURL('image/jpeg', 0.85));
                                    } else {
                                        // 圖片格式（.png, .jpg）：直接使用路徑
                                        next(gid, posterPath);
                                    }
                                }
                            } else {
                                // 沒海報：載入 PDF 第一頁
                                const pdf = await pdfjsLib.getDocument(getPdfPath(gid)).promise;
                                const page = await pdf.getPage(1);
                                const scale = 2;
                                const viewport = page.getViewport({ scale });
                                const canvas = document.createElement('canvas');
                                canvas.width = viewport.width;
                                canvas.height = viewport.height;
                                await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                                next(gid, canvas.toDataURL('image/jpeg', 0.85));
                            }
                        } catch (e) {
                            console.warn('Cover load fail group ' + gid, e);
                        }
                    }
                };
                loadCovers();
            }, [loading]);

            const handleDownload = useCallback((e, groupId) => {
                e.stopPropagation();
                const path = getPdfPath(groupId);
                const name = getPdfFilename(groupId);
                fetch(path).then((r) => r.blob()).then((blob) => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = name;
                    a.click();
                    URL.revokeObjectURL(url);
                }).catch((err) => { console.warn(err); window.open(path, '_blank'); });
            }, []);

            const groups = [
                { id: 1, name: '第 1 組作品', theme: '棒球與 AI 敘事' }, // B
                { id: 2, name: '第 2 組作品', theme: '棒球與 AI 敘事' }, // C
                { id: 3, name: '第 3 組作品', theme: '棒球與 AI 敘事' }, // D
                { id: 4, name: '第 4 組作品', theme: '棒球與 AI 敘事' }, // E
                { id: 5, name: '第 5 組作品', theme: '棒球與 AI 敘事' }, // F
                { id: 6, name: '第 6 組作品', theme: '棒球與 AI 敘事' }, // G 版本一
                { id: 7, name: '第 6 組作品（版本二）', theme: '棒球與 AI 敘事' }, // G 版本二
                { id: 8, name: '第 7 組作品', theme: '棒球與 AI 敘事' }, // H
                { id: 9, name: '第 8 組作品', theme: '棒球與 AI 敘事' }, // I
                { id: 10, name: '第 9 組作品', theme: '棒球與 AI 敘事' }, // J
                { id: 11, name: '第 10 組作品', theme: '棒球與 AI 敘事' }, // K
                { id: 12, name: '第 11 組作品', theme: '棒球與 AI 敘事' }, // L
            ];

            if (loading) {
                return (
                    <div className="fixed inset-0 bg-[#0f172a] flex flex-col items-center justify-center p-6">
                        <div className="w-full max-w-md bg-slate-800 h-1">
                            <div 
                                className="h-full bg-blue-500 transition-all duration-300 ease-out"
                                style={{ width: `${progress}%` }}
                            />
                        </div>
                        <p className="text-blue-400 mt-4 font-mono text-sm tracking-widest animate-pulse-slow">
                            SYSTEM_INITIALIZING... {Math.round(progress)}%
                        </p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen text-slate-900 selection:bg-blue-200 selection:text-blue-900">
                    {/* 頂部導覽線 */}
                    <div className="fixed top-0 left-0 w-full h-1 bg-slate-200 z-50">
                        <div className="h-full bg-blue-600 w-full"></div>
                    </div>

                    {/* Hero Section */}
                    <header className="relative bg-[#0f172a] text-white py-24 px-6 border-b-4 border-blue-600">
                        <div className="absolute inset-0 opacity-20 grid-pattern"></div>
                        <div className="relative max-w-5xl mx-auto text-center">
                            <div className="inline-flex items-center gap-2 px-4 py-1 bg-blue-600/20 border border-blue-500/40 text-blue-400 text-xs font-bold uppercase tracking-[0.2em] mb-8">
                                <Icon name="cpu" size={14} />
                                <span>AI x Baseball Manga Exhibition</span>
                            </div>
                            <h1 className="text-5xl md:text-7xl font-black mb-6 tracking-tighter">
                                棒球漫畫xAI
                            </h1>
                            <p className="text-lg md:text-xl text-blue-100/60 font-light max-w-3xl mx-auto leading-relaxed tracking-wide">
                                愛（AI）看野球番：以生成式AI打造棒球漫畫互動導覽
                            </p>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-6 py-16">
                        {/* 課程說明 */}
                        <section className="bg-white border-2 border-slate-900 p-8 md:p-12 mb-20 relative">
                            <div className="absolute -top-4 left-8 bg-slate-900 text-white px-6 py-1 text-sm font-bold uppercase tracking-widest">
                                About_Course
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-12 mt-4">
                                <div className="space-y-6 text-slate-600 text-lg leading-relaxed">
                                    <p>
                                        臺灣棒球漫畫，是承載熱情且堅定的文化力量。以漫畫守護棒球夢想、記錄榮光，也直視傷痕。這份由墨水、汗水與淚水交織的熱忱，不僅凝聚對「國球」的文化認同，在走出畫格後，化為下一場投捕的契機，持續譜寫屬於臺灣的棒球故事。
                                    </p>
                                    <p>
                                        而在漫畫家創作之外，國立成功大學通識課程「愛（AI）看野球番：以生成式AI打造棒球漫畫互動導覽」，則試圖以不同球隊、賽事與棒球主題為核心，發展出完整的漫畫敘事內容，以生成式AI作為輔助工具，從情節設定、角色塑造、分鏡節奏到視覺風格，皆由學生自行構思與整合，11組課程實作成果，涵蓋經典一局的重現、歷史事件的再敘事、虛構外傳，以及當代棒球記憶的轉化，展現棒球作為文化文本的多重可能性。各組成果風格各異，卻同樣聚焦於棒球所承載的情感、時代意義與集體記憶。
                                    </p>
                                    <div className="bg-slate-50 border-l-8 border-blue-600 p-6 text-slate-800 font-medium italic">
                                        壘上有人：臺灣棒球漫畫的全力一擊 棒球漫畫主題特展
                                        <br />
                                        Runners on Base: Powerful Hits from Taiwan's Baseball Comics
                                    </div>
                                </div>
                                <div className="space-y-6 text-slate-600 text-sm leading-relaxed md:border-l border-slate-100 md:pl-12">
                                    <p>
                                        Taiwan’s baseball comics represent a passionate and steadfast cultural force. They safeguard baseball dreams, record glory, and confront scars. This fervor, woven from ink, sweat, and tears, not only condenses cultural identity regarding the “national sport” but also transforms into the opportunity for the next pitch after stepping out of the panels, continuing to write Taiwan’s baseball story.
                                    </p>
                                    <p>
                                        Beyond professional works, the NCKU general education course "Love (AI) Baseball Comic: Building Interactive Guides with Generative AI" explores baseball narrative through technology. Students utilized Generative AI to craft complete comic stories—from plot and character design to pacing and visual style.
                                    </p>
                                    <p>
                                        The 11 featured projects range from recreations of classic innings and historical retellings to fictional spin-offs and modern memories. While each group showcases a unique style, they all converge on the same core: the emotions, era-defining significance, and collective memories embedded in baseball.
                                    </p>
                                </div>
                            </div>
                        </section>

                        {/* 網格展示 */}
                        <section className="pb-24">
                            <div className="flex flex-col md:flex-row md:items-end justify-between mb-12 gap-4 border-b-2 border-slate-200 pb-6">
                                <div>
                                    <h2 className="text-4xl font-black text-slate-900 tracking-tighter uppercase">Exhibition_Data</h2>
                                    <p className="text-slate-500 mt-2 font-mono uppercase tracking-widest text-xs">Scan the QR code to enter each group's session</p>
                                </div>
                                <div className="bg-blue-600 text-white px-4 py-2 text-sm font-bold">
                                    12 GROUPS LOADED
                                </div>
                            </div>

                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                                {groups.map((group) => (
                                    <div 
                                        key={group.id} 
                                        role="button"
                                        tabIndex={0}
                                        onClick={() => window.open(getPdfPath(group.id), '_blank')}
                                        onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); window.open(getPdfPath(group.id), '_blank'); } }}
                                        className="group bg-white border border-slate-200 p-6 transition-all duration-200 hover:border-blue-600 hover:shadow-[8px_8px_0px_0px_rgba(37,99,235,1)] cursor-pointer"
                                    >
                                        <div className="flex justify-between items-start mb-6">
                                            <div className="w-10 h-10 bg-slate-900 text-white flex items-center justify-center font-bold text-xs">
                                                {groupConfig[group.id]?.variant === 2 ? '06-2' : group.id <= 6 ? group.id.toString().padStart(2, '0') : (group.id - 1).toString().padStart(2, '0')}
                                            </div>
                                            <button
                                                type="button"
                                                onClick={(e) => handleDownload(e, group.id)}
                                                className="text-slate-300 hover:text-blue-600"
                                                aria-label="下載漫畫"
                                            >
                                                <Icon name="share" size={18} />
                                            </button>
                                        </div>

                                        <div className="aspect-[2/3] w-full bg-slate-50 border border-slate-100 flex flex-col items-center justify-center text-slate-300 group-hover:bg-blue-50/50 group-hover:border-blue-200 transition-all relative mb-6 overflow-hidden">
                                            {coverUrls[group.id] ? (
                                                <img 
                                                    src={coverUrls[group.id]} 
                                                    alt={`${group.name} 封面`} 
                                                    className={`w-full h-full object-cover ${groupConfig[group.id]?.hasPoster ? 'object-contain' : ([1, 7, 10].includes(group.id) ? 'object-center' : 'object-top')}`} 
                                                />
                                            ) : (
                                                <>
                                                    <Icon name="qr" size={48} className="mb-2 opacity-50" />
                                                    <p className="text-[10px] font-mono uppercase tracking-[0.3em]">Loading...</p>
                                                </>
                                            )}
                                            <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity bg-blue-600/20 backdrop-blur-[1px]">
                                                <span className="px-4 py-2 bg-blue-600 text-white text-xs font-bold tracking-widest border border-white">點擊閱讀</span>
                                            </div>
                                        </div>

                                        <h3 className="text-lg font-bold text-slate-800 mb-1 group-hover:text-blue-600 uppercase tracking-tight">
                                            {group.name}
                                        </h3>
                                        <p className="text-xs text-slate-400 flex items-center gap-1 font-mono">
                                            <Icon name="book" size={12} />
                                            STATUS: PENDING
                                        </p>
                                    </div>
                                ))}
                            </div>
                        </section>
                    </main>

                    <footer className="bg-slate-900 text-white py-16 px-6 border-t-4 border-blue-600">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8 text-center md:text-left">
                            <div>
                                <h2 className="text-2xl font-black mb-2 tracking-tighter uppercase">棒球漫畫xAI</h2>
                                <p className="text-slate-500 text-sm font-mono tracking-widest text-xs">NCKU GENERAL EDUCATION EXHIBITION</p>
                            </div>
                            <div className="text-slate-400 text-xs font-mono text-center md:text-right border-t md:border-t-0 md:border-l border-slate-800 pt-8 md:pt-0 md:pl-12">
                                <p>指導單位：成大歷史系 / 敏求智慧運算學院</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
